name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'true'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: felix

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfontconfig-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libx11-dev \
            libxcb1-dev \
            libxcb-xkb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render-util0-dev \
            libxcb-image0-dev \
            libxcb-icccm4-dev \
            libxcb-keysyms1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libglib2.0-dev \
            dpkg-dev \
            rpm \
            imagemagick \
            wget \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build release
        run: cargo build --release

      - name: Verify binary
        run: |
          file target/release/${{ env.BINARY_NAME }}
          ls -lh target/release/${{ env.BINARY_NAME }}

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          bash packaging/appimage/build-appimage.sh \
            "target/release/${{ env.BINARY_NAME }}" \
            "${{ steps.version.outputs.version }}"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp target/debian/*.deb artifacts/ 2>/dev/null || true
          cp target/generate-rpm/*.rpm artifacts/ 2>/dev/null || true
          cp felix-*.AppImage artifacts/ 2>/dev/null || true
          cp target/release/${{ env.BINARY_NAME }} artifacts/felix-linux-x86_64
          echo "Artifacts:"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: felix-artifacts
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "felix v${{ steps.version.outputs.version }}"
          body: |
            ## felix v${{ steps.version.outputs.version }}

            A lightweight, fast file manager with built-in document tools.

            ### Installation

            **DEB (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i felix_*.deb
            sudo apt-get install -f
            ```

            **RPM (Fedora/RHEL/openSUSE):**
            ```bash
            sudo rpm -i felix-*.rpm
            ```

            **AppImage (any Linux):**
            ```bash
            chmod +x felix-*.AppImage
            ./felix-*.AppImage
            ```

            **From crates.io:**
            ```bash
            cargo install felix
            ```
          files: artifacts/**/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
