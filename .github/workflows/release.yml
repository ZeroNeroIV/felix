name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: felix

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfontconfig-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libx11-dev \
            libxcb1-dev \
            libxcb-xkb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-render-util0-dev \
            libxcb-image0-dev \
            libxcb-icccm4-dev \
            libxcb-keysyms1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libglib2.0-dev \
            dpkg-dev \
            rpm \
            imagemagick \
            wget \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary
        run: |
          file target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          ls -lh target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      # ─── Determine version ───────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # Extract version from Cargo.toml for main branch builds
            VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      # ─── Build .deb ──────────────────────────────────────────────────
      - name: Build .deb package
        run: cargo deb --target ${{ matrix.target }} --no-build

      # ─── Build .rpm ──────────────────────────────────────────────────
      - name: Build .rpm package
        run: cargo generate-rpm --target ${{ matrix.target }}

      # ─── Build AppImage ──────────────────────────────────────────────
      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          bash packaging/appimage/build-appimage.sh \
            "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" \
            "${{ steps.version.outputs.version }}"

      # ─── Collect artifacts ───────────────────────────────────────────
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/debian/*.deb artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/generate-rpm/*.rpm artifacts/ 2>/dev/null || true
          cp felix-*.AppImage artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} artifacts/felix-linux-${{ matrix.arch }}
          echo "Artifacts:"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: felix-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "felix v${{ steps.version.outputs.version }}"
          body: |
            ## felix v${{ steps.version.outputs.version }}

            A lightweight, fast file manager with built-in document tools.

            ### Installation

            **DEB (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i felix_*.deb
            sudo apt-get install -f  # fix dependencies if needed
            ```

            **RPM (Fedora/RHEL/openSUSE):**
            ```bash
            sudo rpm -i felix-*.rpm
            ```

            **AppImage (any Linux):**
            ```bash
            chmod +x felix-*.AppImage
            ./felix-*.AppImage
            ```

            **From crates.io:**
            ```bash
            cargo install felix
            ```
          files: artifacts/**/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Main branch auto-release ─────────────────────────────────────────
  main-release:
    name: Main Branch Release
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "felix v${{ steps.version.outputs.version }} (Latest)"
          body: |
            ## felix v${{ steps.version.outputs.version }} (Latest Release)

            Latest stable release built from main branch.
            Commit: `${{ github.sha }}`

            ### Artifacts

            Built from commit `${{ steps.version.outputs.sha_short }}`
          files: artifacts/**/*
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}